<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Setup Complete – RefreshMe</title>
    <style>
        :root { --gold: #C9A84C; --bg: #0D0D0D; --surface: #1A1A1A; --text: #F0F0F0; --text-muted: #9A9A9A; --border: #2E2E2E; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
        .logo { font-size: 28px; font-weight: 900; color: var(--gold); margin-bottom: 28px; }
        .logo span { color: var(--text); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 28px; max-width: 400px; width: 100%; }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
        p { color: var(--text-muted); font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
        .btn { display: block; width: 100%; padding: 16px; background: var(--gold); color: #000; font-weight: 800; font-size: 16px; border-radius: 12px; text-decoration: none; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .note { font-size: 12px; color: var(--text-muted); margin-top: 16px; }
    </style>
</head>
<body>
    <div class="logo">Refresh<span>Me</span></div>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Stripe Setup Complete!</h1>
        <p>Your payout account is connected. RefreshMe will automatically send your earnings to your bank account after each completed booking.</p>
        <a href="refreshme://dashboard" class="btn">Back to Dashboard</a>
        <p class="note">It may take a moment for your account status to update in the app.</p>
    </div>
    <script>
        // Attempt to deep-link back to the app automatically
        setTimeout(() => { window.location.href = "refreshme://dashboard"; }, 2000);
    </script>
</body>
</html>
