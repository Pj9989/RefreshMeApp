<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - RefreshMe</title>
    <style>
        :root {
            --gold: #C9A84C;
            --bg: #0D0D0D;
            --surface: #1A1A1A;
            --text: #F0F0F0;
            --text-muted: #9A9A9A;
            --border: #2E2E2E;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .logo { font-size: 24px; font-weight: 800; color: var(--gold); margin-bottom: 32px; }
        .logo span { color: var(--text); }
        .code { font-size: 72px; font-weight: 900; color: var(--gold); line-height: 1; }
        h1 { font-size: 22px; font-weight: 700; margin: 12px 0 8px; }
        p { font-size: 15px; color: var(--text-muted); margin-bottom: 28px; }
        a {
            display: inline-block;
            padding: 13px 28px;
            background: var(--gold);
            color: #000;
            font-weight: 700;
            font-size: 15px;
            border-radius: 12px;
            text-decoration: none;
        }
        a:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="logo">Refresh<span>Me</span></div>
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Go Home</a>
</body>
</html>
