<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RefreshMe — Admin</title>
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#1A1A2E" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">

<style>
  :root{
    --purple:#7B2FBE; --purple-2:#9b4dd6; --gold:#F5A623;
    --navy:#1A1A2E; --green:#17c964; --red:#f31260;
    --ink:#0b0b14; --surface:#15151f; --line:rgba(255,255,255,.08);
    --text:#fff; --muted:#9a9aa8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--ink);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh}

  .gate{
    min-height:100vh;display:grid;place-items:center;padding:2rem;
  }
  .gate-card{
    background:var(--surface);border:1px solid var(--line);
    border-radius:16px;padding:2.5rem;max-width:420px;width:100%;
    text-align:center;
  }
  .mark{
    width:56px;height:56px;border-radius:14px;margin:0 auto 1rem;
    background:linear-gradient(135deg,var(--purple),var(--purple-2));
    display:grid;place-items:center;
    font-family:'Inter';font-weight:800;font-size:1.8rem;
    box-shadow:0 8px 24px rgba(123,47,190,.4);
  }
  .gate h1{font-size:1.4rem;margin-bottom:.4rem;font-weight:800}
  .gate p{color:var(--muted);margin-bottom:1.5rem;font-size:.95rem;line-height:1.5}
  .gate button{
    background:linear-gradient(135deg,var(--purple),var(--purple-2));
    color:#fff;border:none;padding:.9rem 1.6rem;border-radius:10px;
    font-weight:700;font-size:.95rem;cursor:pointer;font-family:inherit;
    transition:transform .15s ease;
  }
  .gate button:hover{transform:translateY(-1px)}
  .gate .err{color:var(--red);font-size:.85rem;margin-top:1rem;min-height:1em}

  .app{display:none}
  .app.show{display:block}

  header{
    background:var(--surface);border-bottom:1px solid var(--line);
    padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;
    position:sticky;top:0;z-index:10;
  }
  .brand{display:flex;align-items:center;gap:.7rem}
  .brand .mark{width:34px;height:34px;font-size:1.1rem;margin:0;box-shadow:none}
  .brand h1{font-size:1rem;font-weight:800;letter-spacing:-.01em}
  .brand .tag{
    font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;
    color:var(--gold);font-weight:700;
    padding:.2rem .5rem;border:1px solid rgba(245,166,35,.3);
    border-radius:4px;margin-left:.5rem;
  }
  .user{display:flex;align-items:center;gap:.8rem;font-size:.85rem;color:var(--muted)}
  .user button{
    background:transparent;border:1px solid var(--line);color:var(--text);
    padding:.4rem .9rem;border-radius:8px;font-size:.8rem;cursor:pointer;font-family:inherit;
  }
  .user button:hover{background:rgba(255,255,255,.05)}

  .stats{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:1rem;padding:1.5rem 2rem 0;
  }
  .stat{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:1.1rem 1.3rem;
  }
  .stat .label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:.3rem}
  .stat .value{font-size:1.8rem;font-weight:800;letter-spacing:-.02em}
  .stat.new .value{color:var(--gold)}
  .stat.approved .value{color:var(--green)}

  .filters{
    display:flex;gap:.6rem;padding:1.5rem 2rem;flex-wrap:wrap;align-items:center;
  }
  .filters input[type="search"]{
    flex:1;min-width:220px;padding:.7rem .95rem;border-radius:10px;border:1px solid var(--line);
    background:var(--surface);color:#fff;font-size:.9rem;font-family:inherit;
  }
  .filters select{
    padding:.7rem .95rem;border-radius:10px;border:1px solid var(--line);
    background:var(--surface);color:#fff;font-size:.9rem;font-family:inherit;cursor:pointer;
  }
  .filters input:focus, .filters select:focus{outline:none;border-color:var(--purple-2)}

  .list{padding:0 2rem 3rem;display:grid;gap:.8rem}
  .row{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:1rem 1.2rem;display:grid;gap:.7rem;
    grid-template-columns:1fr auto;align-items:center;
    transition:border-color .15s ease;
  }
  .row:hover{border-color:rgba(155,77,214,.4)}
  .row-main{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;min-width:0}
  .row-name{font-weight:700;font-size:1rem}
  .row-meta{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;font-size:.85rem;color:var(--muted)}
  .chip{
    font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;
    padding:.2rem .55rem;border-radius:999px;font-weight:700;
    background:rgba(155,77,214,.15);color:var(--purple-2);
    border:1px solid rgba(155,77,214,.3);
  }
  .chip.role{background:rgba(245,166,35,.1);color:var(--gold);border-color:rgba(245,166,35,.3)}
  .chip.new{background:rgba(245,166,35,.15);color:var(--gold);border-color:rgba(245,166,35,.35)}
  .chip.contacted{background:rgba(123,47,190,.15);color:var(--purple-2);border-color:rgba(123,47,190,.35)}
  .chip.approved{background:rgba(23,201,100,.12);color:var(--green);border-color:rgba(23,201,100,.35)}
  .chip.rejected{background:rgba(243,18,96,.1);color:var(--red);border-color:rgba(243,18,96,.3)}

  .row-actions{display:flex;gap:.4rem;flex-wrap:wrap}
  .btn{
    padding:.55rem .9rem;border-radius:8px;font-size:.8rem;font-weight:700;
    text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;
    border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);
    cursor:pointer;font-family:inherit;
    transition:background .15s ease, transform .15s ease;
  }
  .btn:hover{background:rgba(255,255,255,.08);transform:translateY(-1px)}
  .btn.primary{background:var(--purple);border-color:var(--purple);color:#fff}
  .btn.primary:hover{background:var(--purple-2)}
  .btn.success{background:var(--green);border-color:var(--green);color:#000}
  .btn.danger{background:transparent;border-color:rgba(243,18,96,.4);color:var(--red)}
  .btn.danger:hover{background:rgba(243,18,96,.1)}

  details.detail{
    grid-column:1 / -1;margin-top:.6rem;padding-top:.9rem;border-top:1px solid var(--line);
  }
  details.detail summary{cursor:pointer;color:var(--muted);font-size:.82rem;list-style:none;user-select:none}
  details.detail summary::-webkit-details-marker{display:none}
  details.detail summary::before{content:'▸ ';color:var(--purple-2)}
  details.detail[open] summary::before{content:'▾ '}
  .detail-grid{
    display:grid;gap:.6rem;margin-top:.9rem;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  }
  .detail-item{font-size:.85rem}
  .detail-item .k{color:var(--muted);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.15rem;font-weight:600}
  .detail-item .v{color:#fff;word-break:break-word}
  .detail-item .v a{color:var(--purple-2);text-decoration:none}
  .notes-block{
    grid-column:1 / -1;background:rgba(0,0,0,.3);border:1px solid var(--line);
    border-radius:8px;padding:.9rem 1rem;font-size:.88rem;line-height:1.55;white-space:pre-wrap;
  }

  .empty{
    text-align:center;padding:4rem 1rem;color:var(--muted);
    background:var(--surface);border:1px dashed var(--line);border-radius:12px;
  }
  .loading{text-align:center;padding:2rem;color:var(--muted)}

  @media(max-width:640px){
    header{padding:1rem}
    .stats,.filters,.list{padding-left:1rem;padding-right:1rem}
    .row{grid-template-columns:1fr}
    .row-actions{justify-content:flex-start}
  }
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAihgs5zYHjrxJDGHqDaDwDqeBsYwKnuHc",
    authDomain: "refreshme-74f79.firebaseapp.com",
    projectId: "refreshme-74f79",
    storageBucket: "refreshme-74f79.firebasestorage.app",
    messagingSenderId: "12424011789",
    appId: "1:12424011789:web:bc6d05cddc3731c8bef544"
  };
  const FOUNDER_EMAIL = "youngmulapj@gmail.com";
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">
    <div class="mark">R</div>
    <h1>RefreshMe Admin</h1>
    <p>Founder access only. Sign in with <strong style="color:#fff">youngmulapj@gmail.com</strong>.</p>
    <button id="signInBtn" type="button">Sign in with Google</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div class="app" id="app">
  <header>
    <div class="brand">
      <div class="mark">R</div>
      <h1>RefreshMe</h1>
      <span class="tag">Admin</span>
    </div>
    <div class="user">
      <span id="userEmail"></span>
      <button id="signOutBtn" type="button">Sign out</button>
    </div>
  </header>

  <section class="stats">
    <div class="stat"><div class="label">Total Applications</div><div class="value" id="statTotal">—</div></div>
    <div class="stat new"><div class="label">New / Unreviewed</div><div class="value" id="statNew">—</div></div>
    <div class="stat"><div class="label">Contacted</div><div class="value" id="statContacted">—</div></div>
    <div class="stat approved"><div class="label">Approved</div><div class="value" id="statApproved">—</div></div>
  </section>

  <section class="filters">
    <input type="search" id="search" placeholder="Search name, city, Instagram…" autocomplete="off" />
    <select id="filterStatus">
      <option value="">All statuses</option>
      <option value="new">New</option>
      <option value="contacted">Contacted</option>
      <option value="approved">Approved</option>
      <option value="rejected">Rejected</option>
    </select>
    <select id="filterRole">
      <option value="">All roles</option>
      <option value="Barber">Barber</option>
      <option value="Hair Stylist">Hair Stylist</option>
      <option value="Loctician">Loctician</option>
      <option value="Braider">Braider</option>
      <option value="Nail Tech">Nail Tech</option>
      <option value="Makeup Artist">Makeup Artist</option>
    </select>
  </section>

  <section class="list" id="list">
    <div class="loading">Loading applications…</div>
  </section>
</div>

<script>
  // ---- Auth gate ----------------------------------------------------------
  const gate = document.getElementById('gate');
  const app = document.getElementById('app');
  const gateErr = document.getElementById('gateErr');

  document.getElementById('signInBtn').addEventListener('click', async () => {
    gateErr.textContent = '';
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      await auth.signInWithPopup(provider);
    } catch (err) {
      console.error(err);
      gateErr.textContent = err.message || 'Sign-in failed.';
    }
  });

  document.getElementById('signOutBtn').addEventListener('click', () => auth.signOut());

  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      gate.style.display = 'grid';
      app.classList.remove('show');
      return;
    }
    if (user.email !== FOUNDER_EMAIL) {
      gateErr.textContent = 'This account is not authorized. Sign out and try ' + FOUNDER_EMAIL + '.';
      await auth.signOut();
      return;
    }
    document.getElementById('userEmail').textContent = user.email;
    gate.style.display = 'none';
    app.classList.add('show');
    subscribe();
  });

  // ---- Live data ----------------------------------------------------------
  let allDocs = [];
  const listEl = document.getElementById('list');
  const search = document.getElementById('search');
  const fStatus = document.getElementById('filterStatus');
  const fRole = document.getElementById('filterRole');

  search.addEventListener('input', render);
  fStatus.addEventListener('change', render);
  fRole.addEventListener('change', render);

  function subscribe() {
    db.collection('stylist_applications')
      .orderBy('createdAt', 'desc')
      .onSnapshot(
        (snap) => {
          allDocs = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
          updateStats();
          render();
        },
        (err) => {
          console.error(err);
          listEl.innerHTML = '<div class="empty">Could not load applications. Check your Firestore rules + your sign-in email.</div>';
        }
      );
  }

  function updateStats() {
    const by = (s) => allDocs.filter((d) => (d.status || 'new') === s).length;
    document.getElementById('statTotal').textContent = allDocs.length;
    document.getElementById('statNew').textContent = by('new');
    document.getElementById('statContacted').textContent = by('contacted');
    document.getElementById('statApproved').textContent = by('approved');
  }

  function render() {
    const q = search.value.trim().toLowerCase();
    const s = fStatus.value;
    const r = fRole.value;
    const filtered = allDocs.filter((d) => {
      if (s && (d.status || 'new') !== s) return false;
      if (r && d.role !== r) return false;
      if (q) {
        const hay = [d.firstName, d.lastName, d.city, d.instagram, d.email, d.phone]
          .filter(Boolean).join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    if (!filtered.length) {
      listEl.innerHTML = '<div class="empty">No applications match these filters yet.</div>';
      return;
    }

    listEl.innerHTML = filtered.map(renderRow).join('');
  }

  function renderRow(d) {
    const status = d.status || 'new';
    const when = d.createdAt && d.createdAt.toDate ? timeAgo(d.createdAt.toDate()) : '—';
    const ig = (d.instagram || '').replace(/^@/, '');
    const phoneDigits = (d.phone || '').replace(/[^+0-9]/g, '');
    const esc = escapeHtml;

    return `
      <article class="row" data-id="${esc(d.id)}">
        <div class="row-main">
          <div class="row-name">${esc(d.firstName || '')} ${esc(d.lastName || '')}</div>
          <div class="row-meta">
            <span class="chip role">${esc(d.role || 'Unknown')}</span>
            <span class="chip ${status}">${esc(status)}</span>
            <span>📍 ${esc(d.city || '—')}</span>
            <span>•</span>
            <span>${esc(when)}</span>
          </div>
        </div>
        <div class="row-actions">
          ${phoneDigits ? `<a class="btn primary" href="sms:${esc(phoneDigits)}">Text</a>` : ''}
          ${d.email ? `<a class="btn" href="mailto:${esc(d.email)}">Email</a>` : ''}
          ${ig ? `<a class="btn" target="_blank" rel="noopener" href="https://instagram.com/${esc(ig)}">IG</a>` : ''}
          ${status !== 'contacted' ? `<button class="btn" data-act="contacted" data-id="${esc(d.id)}">Mark Contacted</button>` : ''}
          ${status !== 'approved' ? `<button class="btn success" data-act="approved" data-id="${esc(d.id)}">Approve</button>` : ''}
          ${status !== 'rejected' ? `<button class="btn danger" data-act="rejected" data-id="${esc(d.id)}">Reject</button>` : ''}
        </div>
        <details class="detail">
          <summary>Details</summary>
          <div class="detail-grid">
            <div class="detail-item"><div class="k">Email</div><div class="v">${d.email ? `<a href="mailto:${esc(d.email)}">${esc(d.email)}</a>` : '—'}</div></div>
            <div class="detail-item"><div class="k">Phone</div><div class="v">${d.phone ? `<a href="tel:${esc(phoneDigits)}">${esc(d.phone)}</a>` : '—'}</div></div>
            <div class="detail-item"><div class="k">Instagram</div><div class="v">${ig ? `<a target="_blank" rel="noopener" href="https://instagram.com/${esc(ig)}">@${esc(ig)}</a>` : '—'}</div></div>
            <div class="detail-item"><div class="k">City</div><div class="v">${esc(d.city || '—')}</div></div>
            <div class="detail-item"><div class="k">Source</div><div class="v">${esc(d.source || '—')}</div></div>
            <div class="detail-item"><div class="k">Doc ID</div><div class="v" style="font-family:monospace;font-size:.75rem">${esc(d.id)}</div></div>
            ${d.notes ? `<div class="notes-block"><div class="k" style="color:var(--muted);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem">Notes</div>${esc(d.notes)}</div>` : ''}
          </div>
        </details>
      </article>
    `;
  }

  listEl.addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-act]');
    if (!btn) return;
    const id = btn.dataset.id;
    const act = btn.dataset.act;
    btn.disabled = true;
    const prev = btn.textContent;
    btn.textContent = 'Saving…';
    try {
      await db.collection('stylist_applications').doc(id).update({
        status: act,
        statusUpdatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        statusUpdatedBy: auth.currentUser.email
      });
      // onSnapshot will re-render with fresh state.
    } catch (err) {
      console.error(err);
      alert('Update failed: ' + (err.message || err));
      btn.disabled = false;
      btn.textContent = prev;
    }
  });

  // ---- Utils --------------------------------------------------------------
  function timeAgo(date) {
    const s = Math.floor((Date.now() - date.getTime()) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    if (s < 604800) return Math.floor(s / 86400) + 'd ago';
    return date.toLocaleDateString();
  }

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
</script>

</body>
</html>
