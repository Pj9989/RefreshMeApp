<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RefreshMe - Beauty & Style Services</title>
    <style>
        :root {
            --gold: #C9A84C;
            --bg: #0D0D0D;
            --surface: #1A1A1A;
            --surface2: #242424;
            --text: #F0F0F0;
            --text-muted: #9A9A9A;
            --border: #2E2E2E;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }
        .logo { font-size: 36px; font-weight: 900; color: var(--gold); margin-bottom: 12px; }
        .logo span { color: var(--text); }
        .tagline { font-size: 16px; color: var(--text-muted); max-width: 380px; margin: 0 auto 36px; line-height: 1.6; }
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }
        .btn {
            padding: 13px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-muted); }
        .contact { font-size: 13px; color: var(--text-muted); }
        .contact a { color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>
    <div class="logo">Refresh<span>Me</span></div>
    <p class="tagline">Your premier destination for beauty and style services. Download our app to book top stylists near you.</p>
    <div class="links">
        <a href="/safety-center.html" class="btn btn-gold">Safety Center</a>
        <a href="/help.html" class="btn btn-outline">Help Center</a>
        <a href="/privacy.html" class="btn btn-outline">Privacy Policy</a>
    </div>
    <p class="contact">Support: <a href="mailto:admin@refreshmeapp.com">admin@refreshmeapp.com</a></p>
</body>
</html>
