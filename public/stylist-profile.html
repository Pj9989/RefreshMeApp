<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylist Profile – RefreshMe</title>
    <style>
        :root {
            --gold: #C9A84C;
            --bg: #0D0D0D;
            --surface: #1A1A1A;
            --surface2: #242424;
            --text: #F0F0F0;
            --text-muted: #9A9A9A;
            --border: #2E2E2E;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }
        .logo { font-size: 28px; font-weight: 900; color: var(--gold); margin-bottom: 6px; }
        .logo span { color: var(--text); }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 28px;
            max-width: 400px;
            width: 100%;
            margin-top: 24px;
        }
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--surface2);
            border: 2px solid var(--gold);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        #stylist-name { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
        #stylist-specialty { color: var(--gold); font-size: 14px; margin-bottom: 20px; }
        .loading { color: var(--text-muted); font-size: 15px; margin-bottom: 24px; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: #000;
            font-weight: 800;
            font-size: 16px;
            border-radius: 12px;
            text-decoration: none;
            transition: opacity 0.2s;
            margin-bottom: 12px;
        }
        .btn:hover { opacity: 0.85; }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-muted);
            font-size: 14px;
            padding: 12px;
        }
        .note { font-size: 12px; color: var(--text-muted); margin-top: 16px; }
    </style>
</head>
<body>
    <div class="logo">Refresh<span>Me</span></div>

    <div class="card">
        <div class="avatar">✂️</div>
        <div id="stylist-name">Loading profile…</div>
        <div id="stylist-specialty"></div>
        <p class="loading" id="loading-msg">Open the RefreshMe app to view the full profile and book an appointment.</p>

        <a id="deep-link" href="refreshme://home" class="btn">View in App</a>
        <a href="https://play.google.com/store" class="btn btn-outline">Download RefreshMe</a>
        <p class="note">Don't have the app yet? Download it free.</p>
    </div>

    <script>
        // Extract stylist ID from URL path: /stylist/{id}
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const stylistId = pathParts.length >= 2 ? pathParts[1] : null;

        if (stylistId) {
            // Update deep link to open the specific stylist in-app
            document.getElementById('deep-link').href = 'refreshme://stylist/' + stylistId;

            // Try to load stylist name from Firestore REST API
            const projectId = 'refreshme-74f79';
            fetch(`https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/users/${stylistId}`)
                .then(r => r.json())
                .then(data => {
                    const fields = data.fields || {};
                    const name = fields.name?.stringValue || fields.displayName?.stringValue;
                    const specialty = fields.specialty?.stringValue;
                    if (name) {
                        document.getElementById('stylist-name').textContent = name;
                        document.getElementById('loading-msg').textContent = 'Open the RefreshMe app to view the full profile and book an appointment.';
                    }
                    if (specialty) {
                        document.getElementById('stylist-specialty').textContent = specialty;
                    }
                })
                .catch(() => {
                    document.getElementById('stylist-name').textContent = 'Stylist Profile';
                });
        } else {
            document.getElementById('stylist-name').textContent = 'Find Your Stylist';
            document.getElementById('loading-msg').textContent = 'Open the RefreshMe app to discover and book top stylists near you.';
        }
    </script>
</body>
</html>
